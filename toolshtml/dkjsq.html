<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贷款计算器（等额本息）</title>
<!-- <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> -->
<style>
  :root {
    --bg: #f5f7fa;
    --bg-secondary: #ffffff;
    --card-left: #ffffff;
    --card-right: #ffffff;
    --fg: #2d3748;
    --fg-muted: #718096;
    --accent: #4299e1;
    --accent-glow: rgba(66, 153, 225, 0.15);
    --accent-soft: rgba(66, 153, 225, 0.08);
    --border: rgba(66, 153, 225, 0.12);
    --border-strong: rgba(66, 153, 225, 0.25);
    --success: #48bb78;
    --danger: #f56565;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* 背景装饰 */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(66,153,225,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: floatBlob 12s ease-in-out infinite;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -15%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(66,153,225,0.04) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    animation: floatBlob 15s ease-in-out infinite reverse;
  }

  @keyframes floatBlob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* 网格背景 */
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(66,153,225,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(66,153,225,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* 页面标题 */
  .page-header {
    text-align: center;
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .page-header h1 {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--fg);
    margin-bottom: 8px;
  }

  .page-header h1 span {
    color: var(--accent);
    position: relative;
  }

  .page-header h1 span::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.5;
  }

  .page-header p {
    font-size: 14px;
    color: var(--fg-muted);
    font-weight: 300;
  }

  /* 主容器 - 左右布局 */
  .calculator-container {
    display: flex;
    gap: 24px;
    width: 1100px;
    max-width: 95vw;
    position: relative;
    z-index: 1;
    align-items: stretch;
  }

  /* 左侧面板 */
  .panel-left {
    flex: 0 0 380px;
    background: var(--card-left);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .panel-left::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), rgba(66,153,225,0.3), transparent);
  }

  .panel-title {
    font-size: 23px;
    font-weight: 700;
    color: var(--fg);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-title i {
    color: var(--accent);
    font-size: 18px;
  }

  /* 表单组 */
  .form-group {
    margin-bottom: 24px;
  }

  .form-label {
    display: block;
    font-size: 18px;
    font-weight: 500;
    color: var(--fg-muted);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper i {
    position: absolute;
    left: 14px;
    color: var(--fg-muted);
    font-size: 14px;
    transition: color 0.3s;
    pointer-events: none;
  }

  .form-input {
    width: 100%;
    height: 48px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 14px 0 40px;
    font-size: 20px;
    font-family: 'DM Mono', monospace;
    color: var(--fg);
    outline: none;
    transition: all 0.3s ease;
  }

  .form-input::placeholder {
    color: rgba(113, 128, 150, 0.5);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 15px;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px var(--accent-glow);
  }

  .form-input:focus + i,
  .form-input:focus ~ i {
    color: var(--accent);
  }

  .input-wrapper:focus-within i {
    color: var(--accent);
  }

  .input-suffix {
    position: absolute;
    right: 14px;
    font-size: 16px;
    color: var(--fg-muted);
    font-weight: 500;
    pointer-events: none;
  }

  /* 大写金额 */
  .chinese-amount {
    margin-top: 10px;
    min-height: 28px;
    padding: 6px 12px;
    background: var(--accent-soft);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 15px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 1px;
    opacity: 0;
    transform: translateY(-4px);
    transition: all 0.35s ease;
  }

  .chinese-amount.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* 计算按钮 */
  .btn-calculate {
    width: 100%;
    height: 52px;
    margin-top: 8px;
    background: linear-gradient(135deg, var(--accent), #2b6cb0);
    border: none;
    border-radius: var(--radius-sm);
    color: #ffffff;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(66,153,225,0.3);
  }

  .btn-calculate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }

  .btn-calculate:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(66,153,225,0.4);
  }

  .btn-calculate:hover::before {
    transform: translateX(100%);
  }

  .btn-calculate:active {
    transform: translateY(0);
  }

  /* 提示信息 */
  .note-text {
    margin-top: auto;
    padding-top: 20px;
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.7;
    border-top: 1px solid var(--border);
  }

  .note-text i {
    color: var(--accent);
    margin-right: 4px;
  }

  /* 右侧面板 */
  .panel-right {
    flex: 1;
    background: var(--card-right);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  .panel-right::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(66,153,225,0.3), var(--accent), rgba(66,153,225,0.3), transparent);
  }

  .panel-right-header {
    padding: 24px 28px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-right-header .panel-title {
    margin-bottom: 0;
  }

  /* 汇总卡片 - 2x2网格布局 */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, auto);
    gap: 16px;
    padding: 20px 28px;
  }

  .summary-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease;
  }

  .summary-card.show {
    opacity: 1;
    transform: translateY(0);
  }

  .summary-card:nth-child(1) {
    transition-delay: 0.08s;
  }

  .summary-card:nth-child(2) {
    transition-delay: 0.16s;
  }

  .summary-card:nth-child(3) {
    transition-delay: 0.24s;
  }

  .summary-card:nth-child(4) {
    transition-delay: 0.32s;
  }

  .summary-label {
    font-size: 15px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--fg);
    white-space: nowrap;
  }

  .summary-value.highlight {
    color: var(--accent);
  }

  .summary-value.danger {
    color: var(--danger);
  }

  .summary-value.success {
    color: var(--success);
  }

  /* 表格区域 - 固定高度，支持独立滚动 */
  .table-wrapper {
    flex: 1;
    padding: 0 28px 24px;
    overflow-y: auto;
    max-height: 400px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    position: relative;
  }

  .table-wrapper::-webkit-scrollbar {
    width: 5px;
  }

  .table-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }

  .table-wrapper::-webkit-scrollbar-thumb {
    background: var(--border-strong);
    border-radius: 3px;
  }

  /* 空状态 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    color: var(--fg-muted);
    gap: 16px;
  }

  .empty-state i {
    font-size: 48px;
    opacity: 0.2;
    animation: emptyPulse 3s ease-in-out infinite;
  }

  @keyframes emptyPulse {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50% { opacity: 0.25; transform: scale(1.05); }
  }

  .empty-state span {
    font-size: 14px;
    font-weight: 300;
  }

  /* 表格 */
  .result-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 18px;
  }

  .result-table thead th {
    position: sticky;
    top: 0;
    background: var(--bg-secondary);
    padding: 12px 16px;
    text-align: left;
    font-size: 18px;
    font-weight: 500;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 1px solid var(--border);
    z-index: 2;
  }

  .result-table thead th:first-child {
    border-radius: var(--radius-sm) 0 0 0;
  }

  .result-table thead th:last-child {
    border-radius: 0 var(--radius-sm) 0 0;
    text-align: center;
  }

  .result-table thead th:nth-child(2),
  .result-table thead th:nth-child(3) {
    text-align: center;
  }

  .result-table tbody tr {
    transition: background 0.2s;
  }

  .result-table tbody tr:hover {
    background: var(--accent-soft);
  }

  .result-table tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(66,153,225,0.05);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
  }

  .result-table tbody td:first-child {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    color: var(--fg);
  }

  .result-table tbody td:nth-child(2) {
    text-align: center;
    color: var(--accent);
    font-weight: 500;
  }

  .result-table tbody td:nth-child(3) {
    text-align: center;
    color: var(--danger);
  }

  .result-table tbody td:nth-child(4) {
    text-align: right;
    color: var(--fg);
    font-weight: 500;
  }

  .result-table tbody tr {
    opacity: 0;
    animation: rowFadeIn 0.35s ease forwards;
  }

  @keyframes rowFadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* 进度条装饰 */
  .bar-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .mini-bar {
    flex: 1;
    height: 4px;
    background: rgba(66,153,225,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* Toast 通知 */
  .toast {
    position: fixed;
    top: 24px;
    right: 24px;
    padding: 14px 20px;
    background: var(--card-left);
    border: 1px solid var(--danger);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 999;
    transform: translateX(120%);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .toast.show {
    transform: translateX(0);
  }

  /* 响应式 */
  @media (max-width: 860px) {
    .calculator-container {
      flex-direction: column;
      width: 100%;
      max-width: 500px;
    }

    .panel-left {
      flex: none;
    }

    .summary-row {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .page-header h1 {
      font-size: 24px;
    }
  }

  /* 减少动画偏好 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>

<header class="page-header">
  <h1>贷款计算器<span>（等额本息）</span></h1>
  <p>快速计算不同还款年限下的月供、利息与总还款额</p>
</header>

<main class="calculator-container">
  <!-- 左侧：输入面板 -->
  <section class="panel-left" aria-label="贷款参数输入">
    <div class="panel-title">
      <i class="fa-solid fa-sliders"></i>
      贷款参数
    </div>

    <div class="form-group">
      <label class="form-label" for="loanAmount">贷款金额</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-coins"></i>
        <input type="text" id="loanAmount" class="form-input" placeholder="请输入贷款金额" inputmode="decimal" aria-describedby="chineseAmount">
        <span class="input-suffix">元</span>
      </div>
      <div class="chinese-amount" id="chineseAmount" aria-live="polite"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="interestRate">年利率</label>
      <div class="input-wrapper">
        <i class="fa-solid fa-percent"></i>
        <input type="text" id="interestRate" class="form-input" placeholder="请输入年利率" inputmode="decimal">
        <span class="input-suffix">%</span>
      </div>
    </div>

    <button class="btn-calculate" id="btnCalculate" aria-label="开始计算">
      <i class="fa-solid fa-calculator"></i>
      开始计算
    </button>

    <div class="note-text">
      <i class="fa-solid fa-circle-info"></i>
      等额本息是指每月还款金额相同，包含本金和利息。
    </div>
  </section>

  <!-- 右侧：结果面板 -->
  <section class="panel-right" aria-label="计算结果">
    <div class="panel-right-header">
      <div class="panel-title">
        <i class="fa-solid fa-chart-column"></i>
        计算结果
      </div>
    </div>

    <!-- 汇总卡片 - 2x2网格布局 -->
    <!-- <div class="summary-row" id="summaryRow" style="display: none;">
      <div class="summary-card" id="summaryCard1">
        <div class="summary-label">贷款金额</div>
        <div class="summary-value highlight" id="summaryAmount">--</div>
      </div>
      <div class="summary-card" id="summaryCard2">
        <div class="summary-label">最低月供</div>
        <div class="summary-value" id="summaryMinMonth">--</div>
      </div>
      <div class="summary-card" id="summaryCard3">
        <div class="summary-label">最高月供</div>
        <div class="summary-value danger" id="summaryMaxMonth">--</div>
      </div>
      <div class="summary-card" id="summaryCard4">
        <div class="summary-label">最低总利息</div>
        <div class="summary-value success" id="summaryMinInterest">--</div>
      </div>
    </div> -->

    <!-- 表格 / 空状态 -->
    <div class="table-wrapper" id="tableWrapper">
      <div class="empty-state" id="emptyState">
        <i class="fa-solid fa-table"></i>
        <span>输入参数后点击计算查看结果</span>
      </div>
      <table class="result-table" id="resultTable" style="display: none;">
        <thead>
          <tr>
            <th>还款年限</th>
            <th>每月还款金额</th>
            <th>总利息</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </section>
</main>

<!-- Toast 通知 -->
<div class="toast" id="toast" role="alert">
  <i class="fa-solid fa-triangle-exclamation"></i>
  <span id="toastMsg"></span>
</div>

<script>
  // ========== 工具函数 ==========

  /** 数字转大写中文金额 */
  function toChineseAmount(num) {
    if (isNaN(num) || num === 0) return '';
    const digits = ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'];
    const units = ['', '拾', '佰', '仟'];
    const bigUnits = ['', '万', '亿'];

    const intPart = Math.floor(num);
    const decPart = Math.round((num - intPart) * 100);
    const jiao = Math.floor(decPart / 10);
    const fen = decPart % 10;

    let result = '';

    if (intPart > 0) {
      const str = String(intPart);
      const len = str.length;
      let zeroFlag = false;

      for (let i = 0; i < len; i++) {
        const d = parseInt(str[i]);
        const pos = len - 1 - i;
        const unitIdx = pos % 4;
        const bigIdx = Math.floor(pos / 4);

        if (d === 0) {
          zeroFlag = true;
          if (unitIdx === 0 && bigIdx > 0) {
            result += bigUnits[bigIdx];
            zeroFlag = false;
          }
        } else {
          if (zeroFlag) {
            result += '零';
            zeroFlag = false;
          }
          result += digits[d] + units[unitIdx];
          if (unitIdx === 0 && bigIdx > 0) {
            result += bigUnits[bigIdx];
          }
        }
      }
      result += '元';
    }

    if (jiao > 0) {
      result += digits[jiao] + '角';
    }
    if (fen > 0) {
      result += digits[fen] + '分';
    }
    if (jiao === 0 && fen === 0) {
      result += '整';
    }

    return result;
  }

  /** 格式化金额（千分位，保留2位小数） */
  function formatMoney(num) {
    return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  /** 显示 toast 通知 */
  function showToast(msg) {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => {
      toast.classList.remove('show');
    }, 2800);
  }

  // ========== 核心计算 ==========

  /**
   * 等额本息月供公式：
   * M = P × r × (1+r)^n / ((1+r)^n - 1)
   * P = 贷款本金, r = 月利率, n = 还款月数
   */
  function calcEqualInstallment(principal, yearRate, years) {
    const monthlyRate = yearRate / 100 / 12;
    const months = years * 12;

    if (monthlyRate === 0) {
      // 零利率特殊处理
      const monthlyPayment = principal / months;
      return {
        years,
        monthlyPayment,
        totalInterest: 0,
        totalPayment: principal
      };
    }

    const factor = Math.pow(1 + monthlyRate, months);
    const monthlyPayment = principal * monthlyRate * factor / (factor - 1);
    const totalPayment = monthlyPayment * months;
    const totalInterest = totalPayment - principal;

    return {
      years,
      monthlyPayment,
      totalInterest,
      totalPayment
    };
  }

  // ========== DOM 交互 ==========

  const loanInput = document.getElementById('loanAmount');
  const rateInput = document.getElementById('interestRate');
  const chineseEl = document.getElementById('chineseAmount');
  const btnCalc = document.getElementById('btnCalculate');
  const emptyState = document.getElementById('emptyState');
  const resultTable = document.getElementById('resultTable');
  const resultBody = document.getElementById('resultBody');
  const summaryRow = document.getElementById('summaryRow');

  // 输入金额时实时显示大写
  loanInput.addEventListener('input', function () {
    // 只允许数字和小数点
    this.value = this.value.replace(/[^\d.]/g, '').replace(/(\..*)\./g, '$1');
    const val = parseFloat(this.value);
    if (!isNaN(val) && val > 0) {
      chineseEl.textContent = toChineseAmount(val);
      chineseEl.classList.add('visible');
    } else {
      chineseEl.classList.remove('visible');
    }
  });

  // 利率输入格式化
  rateInput.addEventListener('input', function () {
    this.value = this.value.replace(/[^\d.]/g, '').replace(/(\..*)\./g, '$1');
  });

  // 回车触发计算
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      btnCalc.click();
    }
  });

  // 点击计算
  btnCalc.addEventListener('click', function () {
    console.log('开始计算按钮被点击');
    
    const principal = parseFloat(loanInput.value);
    const yearRate = parseFloat(rateInput.value);

    console.log('贷款金额:', principal);
    console.log('年利率:', yearRate);

    // 校验
    if (isNaN(principal) || principal <= 0) {
      showToast('请输入有效的贷款金额');
      loanInput.focus();
      return;
    }
    if (isNaN(yearRate) || yearRate < 0) {
      showToast('请输入有效的年利率');
      rateInput.focus();
      return;
    }
    if (yearRate > 50) {
      showToast('年利率不能超过 50%');
      rateInput.focus();
      return;
    }

    // 计算 1~30 年结果
    const results = [];
    for (let y = 5; y <= 30; y = y+5) {
      results.push(calcEqualInstallment(principal, yearRate, y));
    }
/*
    // 汇总数据
    const minMonth = results[results.length - 1].monthlyPayment; // 最低月供（最长年限）
    const maxMonth = results[0].monthlyPayment; // 最高月供（最短年限）
    const minInterest = results[0].totalInterest; // 最低总利息（最短年限）
    const maxInterest = results[results.length - 1].totalInterest; // 最高总利息（最长年限）

    console.log('汇总数据:', {
      minMonth,
      maxMonth,
      minInterest,
      maxInterest
    });

    // 修正：使用正确的元素ID
    document.getElementById('summaryAmount').textContent = formatMoney(principal);
    document.getElementById('summaryMinMonth').textContent = formatMoney(minMonth);
    document.getElementById('summaryMaxMonth').textContent = formatMoney(maxMonth);
    document.getElementById('summaryMinInterest').textContent = formatMoney(minInterest);
    // 修正：这里应该是summaryCard4中的summaryMinInterest，而不是summaryMaxInterest
    document.getElementById('summaryMinInterest').textContent = formatMoney(minInterest);

    // 显示汇总卡片
    summaryRow.style.display = 'grid';
    requestAnimationFrame(() => {
      document.getElementById('summaryCard1').classList.add('show');
      document.getElementById('summaryCard2').classList.add('show');
      document.getElementById('summaryCard3').classList.add('show');
      document.getElementById('summaryCard4').classList.add('show');
    });
*/
    // 渲染表格
    emptyState.style.display = 'none';
    resultTable.style.display = 'table';
    resultBody.innerHTML = '';

    // 计算最大总利息，用于进度条比例
    const maxTotalInterest = Math.max(...results.map(r => r.totalInterest), 1);

    results.forEach((item, idx) => {
      const tr = document.createElement('tr');
      tr.style.animationDelay = `${idx * 0.03}s`;

      const interestRatio = (item.totalInterest / maxTotalInterest * 100).toFixed(1);

      tr.innerHTML = `
        <td>${item.years} 年</td>
        <td>${formatMoney(item.monthlyPayment)}</td>
        <td>${formatMoney(item.totalInterest)}</td>
      `;
      resultBody.appendChild(tr);
    });

    // 滚动到顶部
    document.getElementById('tableWrapper').scrollTop = 0;
  });
</script>
