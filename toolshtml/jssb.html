<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计时秒表</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #f5f7fa; --card: #ffffff; --fg: #2d3748; --fg-muted: #718096;
    --accent: #ec4899; --accent-glow: rgba(236,72,153,0.15); --accent-soft: rgba(236,72,153,0.08);
    --border: rgba(236,72,153,0.12); --border-strong: rgba(236,72,153,0.25);
    --success: #48bb78; --danger: #f56565; --warning: #f6ad55;
    --radius: 14px; --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg); color: var(--fg); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding: 40px 20px;
  }
  body::before {
    content:''; position:fixed; top:-30%; left:-15%;
    width:500px; height:500px;
    background: radial-gradient(circle, rgba(236,72,153,0.06) 0%, transparent 70%);
    border-radius:50%; pointer-events:none;
  }
  .page-header { text-align:center; margin-bottom:36px; }
  .page-header h1 { font-size:32px; font-weight:900; letter-spacing:-0.5px; }
  .page-header h1 span { color:var(--accent); }
  .page-header p { font-size:14px; color:var(--fg-muted); margin-top:8px; }

  .mode-tabs {
    display:flex; gap:8px; margin-bottom:32px;
    background:var(--card); border:1px solid var(--border); border-radius:100px;
    padding:4px;
  }
  .mode-tab {
    padding:10px 28px; border:none; border-radius:100px;
    background:transparent; color:var(--fg-muted); font-size:14px; font-weight:500;
    font-family:inherit; cursor:pointer; transition:all 0.2s;
  }
  .mode-tab.active {
    background:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(236,72,153,0.3);
  }

  .timer-display {
    position:relative; width:280px; height:280px; margin:0 auto 36px;
  }
  .timer-ring {
    width:100%; height:100%; transform:rotate(-90deg);
  }
  .timer-ring-bg { fill:none; stroke:var(--border); stroke-width:6; }
  .timer-ring-progress {
    fill:none; stroke:var(--accent); stroke-width:6;
    stroke-linecap:round; transition: stroke-dashoffset 0.3s;
  }
  .timer-text {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .timer-time {
    font-size:48px; font-weight:900; letter-spacing:2px;
    font-variant-numeric:tabular-nums;
  }
  .timer-label { font-size:13px; color:var(--fg-muted); margin-top:4px; }

  .preset-bar {
    display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; justify-content:center;
  }
  .preset-btn {
    padding:8px 20px; border:1px solid var(--border); border-radius:100px;
    background:var(--card); color:var(--fg-muted); font-size:13px; font-weight:500;
    font-family:inherit; cursor:pointer; transition:all 0.2s;
  }
  .preset-btn:hover { border-color:var(--accent); color:var(--accent); }
  .preset-btn.active {
    background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600;
  }

  .control-bar { display:flex; gap:12px; justify-content:center; }
  .ctrl-btn {
    width:56px; height:56px; border-radius:50%; border:2px solid var(--border);
    background:var(--card); color:var(--fg); font-size:20px;
    cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center;
  }
  .ctrl-btn:hover { transform:scale(1.08); }
  .ctrl-btn.primary {
    width:72px; height:72px; font-size:26px;
    background:var(--accent); color:#fff; border-color:var(--accent);
    box-shadow:0 4px 15px rgba(236,72,153,0.3);
  }
  .ctrl-btn.primary:hover { box-shadow:0 8px 25px rgba(236,72,153,0.4); transform:scale(1.08); }
  .ctrl-btn.danger { color:var(--danger); border-color:rgba(245,101,101,0.2); }

  .custom-input-wrap {
    display:none; align-items:center; gap:12px; margin-bottom:28px;
  }
  .custom-input-wrap.show { display:flex; }
  .custom-min {
    width:80px; height:44px; text-align:center; font-size:20px; font-weight:700;
    border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--card); color:var(--fg); font-family:inherit; outline:none;
  }
  .custom-min:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .custom-label { font-size:14px; color:var(--fg-muted); }

  .alarm-overlay {
    position:fixed; inset:0; background:rgba(245,101,101,0.95);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:24px; z-index:100;
    animation: alarmPulse 0.6s ease-in-out infinite alternate;
  }
  .alarm-overlay.show { display:flex; }
  @keyframes alarmPulse {
    from { opacity:0.85; } to { opacity:1; }
  }
  .alarm-icon { font-size:72px; color:#fff; animation: alarmShake 0.3s ease-in-out infinite; }
  @keyframes alarmShake {
    0%,100% { transform:rotate(0); }
    25% { transform:rotate(-10deg); }
    75% { transform:rotate(10deg); }
  }
  .alarm-text { font-size:28px; font-weight:900; color:#fff; }
  .alarm-dismiss {
    padding:14px 40px; border:2px solid #fff; border-radius:100px;
    background:transparent; color:#fff; font-size:16px; font-weight:600;
    font-family:inherit; cursor:pointer; transition:all 0.2s;
  }
  .alarm-dismiss:hover { background:#fff; color:var(--danger); }

  @media (max-width:480px) {
    .timer-display { width:220px; height:220px; }
    .timer-time { font-size:36px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; }
  }
</style>
</head>
<body>

<header class="page-header">
  <h1><i class="fa-solid fa-stopwatch" style="color:var(--accent)"></i> 计时秒表</h1>
  <p>课堂倒计时与正计时，支持自定义时长</p>
</header>

<div class="mode-tabs">
  <button class="mode-tab active" data-mode="countdown">倒计时</button>
  <button class="mode-tab" data-mode="stopwatch">正计时</button>
</div>

<div class="timer-display">
  <svg class="timer-ring" viewBox="0 0 280 280">
    <circle class="timer-ring-bg" cx="140" cy="140" r="130"/>
    <circle class="timer-ring-progress" id="ringProgress" cx="140" cy="140" r="130"
      stroke-dasharray="816.81" stroke-dashoffset="0"/>
  </svg>
  <div class="timer-text">
    <div class="timer-time" id="timerTime">05:00</div>
    <div class="timer-label" id="timerLabel">倒计时</div>
  </div>
</div>

<div class="preset-bar" id="presetBar">
  <button class="preset-btn" data-sec="60">1 分钟</button>
  <button class="preset-btn" data-sec="180">3 分钟</button>
  <button class="preset-btn active" data-sec="300">5 分钟</button>
  <button class="preset-btn" data-sec="600">10 分钟</button>
  <button class="preset-btn" data-sec="900">15 分钟</button>
  <button class="preset-btn" data-sec="1200">20 分钟</button>
</div>

<div class="custom-input-wrap" id="customWrap">
  <input type="number" class="custom-min" id="customMin" min="1" max="999" value="5">
  <span class="custom-label">分钟</span>
</div>

<div class="control-bar">
  <button class="ctrl-btn" id="btnReset" title="重置"><i class="fa-solid fa-rotate-left"></i></button>
  <button class="ctrl-btn primary" id="btnStart" title="开始"><i class="fa-solid fa-play" id="btnIcon"></i></button>
</div>

<div class="alarm-overlay" id="alarmOverlay">
  <div class="alarm-icon"><i class="fa-solid fa-bell"></i></div>
  <div class="alarm-text">时间到！</div>
  <button class="alarm-dismiss" id="alarmDismiss">知道了</button>
</div>

<script>
const CIRC = 2 * Math.PI * 130;
const ringEl = document.getElementById('ringProgress');
ringEl.style.strokeDasharray = CIRC;

let mode = 'countdown'; // countdown | stopwatch
let totalSec = 300;
let remainSec = 300;
let running = false;
let timer = null;

const timeEl = document.getElementById('timerTime');
const labelEl = document.getElementById('timerLabel');
const presetBar = document.getElementById('presetBar');
const customWrap = document.getElementById('customWrap');
const customMin = document.getElementById('customMin');
const btnStart = document.getElementById('btnStart');
const btnIcon = document.getElementById('btnIcon');
const btnReset = document.getElementById('btnReset');
const alarmOverlay = document.getElementById('alarmOverlay');

function fmt(sec) {
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  return m + ':' + s;
}

function updateDisplay() {
  timeEl.textContent = fmt(Math.max(0, remainSec));
  if (mode === 'countdown' && totalSec > 0) {
    const ratio = remainSec / totalSec;
    ringEl.style.strokeDashoffset = CIRC * (1 - ratio);
  } else if (mode === 'stopwatch') {
    ringEl.style.strokeDashoffset = 0;
    const hours = Math.floor(remainSec / 3600);
    const m = Math.floor((remainSec % 3600) / 60);
    const s = remainSec % 60;
    if (hours > 0) {
      timeEl.textContent = String(hours).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }
  }
}

function tick() {
  if (mode === 'countdown') {
    if (remainSec <= 0) { stop(); showAlarm(); return; }
    remainSec--;
  } else {
    remainSec++;
    if (remainSec > 35999) { stop(); return; }
  }
  updateDisplay();
}

function start() {
  if (running) { stop(); return; }
  running = true;
  btnIcon.className = 'fa-solid fa-pause';
  timer = setInterval(tick, 1000);
}

function stop() {
  running = false;
  btnIcon.className = 'fa-solid fa-play';
  clearInterval(timer);
  timer = null;
}

function reset() {
  stop();
  if (mode === 'countdown') {
    remainSec = totalSec;
  } else {
    remainSec = 0;
  }
  updateDisplay();
}

function showAlarm() {
  alarmOverlay.classList.add('show');
  try { new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQ==').play(); } catch(e){}
}

document.getElementById('alarmDismiss').addEventListener('click', () => {
  alarmOverlay.classList.remove('show');
  reset();
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    mode = tab.dataset.mode;
    stop();
    labelEl.textContent = mode === 'countdown' ? '倒计时' : '正计时';
    if (mode === 'countdown') {
      customWrap.classList.remove('show');
      presetBar.style.display = '';
      remainSec = totalSec;
    } else {
      customWrap.classList.remove('show');
      presetBar.style.display = 'none';
      remainSec = 0;
      totalSec = 0;
    }
    updateDisplay();
  });
});

presetBar.addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  presetBar.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  stop();
  totalSec = parseInt(btn.dataset.sec);
  remainSec = totalSec;
  updateDisplay();
});

btnStart.addEventListener('click', start);
btnReset.addEventListener('click', reset);

updateDisplay();
</script>
</body>
</html>
