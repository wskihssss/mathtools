<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小狗活动区域</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{overflow:hidden;background:#f8fafc;touch-action:none;font-family:'Segoe UI','Microsoft YaHei',sans-serif;user-select:none;-webkit-user-select:none;}
  canvas{display:block;position:absolute;top:0;left:0;}
  canvas.drag-hover{cursor:grab;}
  canvas:active{cursor:grabbing;}
  .ui-panel{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);padding:10px 24px;border-radius:50px;box-shadow:0 4px 20px rgba(0,0,0,0.1);display:flex;align-items:center;gap:15px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,0.05);z-index:10;}
  .slider-group{display:flex;align-items:center;gap:10px;}
  .slider-label{font-weight:700;color:#4b5563;font-size:14px;white-space:nowrap;}
  .slider-value{font-weight:800;color:#059669;font-size:16px;min-width:40px;text-align:right;font-variant-numeric:tabular-nums;}
  input[type=range]{-webkit-appearance:none;width:160px;height:6px;background:#e5e7eb;border-radius:4px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#059669;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.2);border:2px solid #fff;transition:transform 0.1s;}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.1);}
  .divider{width:1px;height:22px;background:#e5e7eb;}
  .zoom-btn{background:#f3f4f6;border:1px solid #e5e7eb;color:#374151;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.15s;padding:0;line-height:1;}
  .zoom-btn:hover{background:#e5e7eb;transform:scale(1.05);}
  .zoom-btn:active{background:#d1d5db;transform:scale(0.95);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui-panel">
  <div class="slider-group">
    <span class="slider-label">绳长</span>
    <input type="range" id="ropeSlider" min="1" max="18" value="4" step="1">
    <span class="slider-value" id="ropeVal">4m</span>
  </div>
  <div class="divider"></div>
  <button class="zoom-btn" id="btnOut">-</button>
  <button class="zoom-btn" id="btnIn">+</button>
</div>
<script>
var c = document.getElementById('c');
var ctx = c.getContext('2d');
var W, H, ppm;
var ropeLen = 4;
var BW = 12, BH = 6;
var dragging = false;
var dogAngle = Math.PI / 4;
var mousePx = 0, mousePy = 0;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  c.width = W; c.height = H;
  ppm = Math.min(W, H) / 26;
  if (!dragging) {
    dogAngle = Math.PI / 4;
    var h = house();
    mousePx = h.tx + ropeLen * ppm * Math.cos(dogAngle);
    mousePy = h.ty + ropeLen * ppm * Math.sin(dogAngle);
  }
  draw();
}

function house() {
  var w = BW * ppm, h = BH * ppm;
  var x = W / 2 - w / 2, y = H / 2 - h / 2;
  return { x: x, y: y, w: w, h: h, tx: x + w, ty: y + h, tr: [x + w, y], bl: [x, y + h] };
}

function safeAngle(a) {
  if (a > Math.PI) a = Math.PI;
  if (a < -Math.PI) a = -Math.PI;
  return a;
}

function norm(dx, dy) {
  var d = Math.sqrt(dx * dx + dy * dy);
  return d < 0.001 ? [0, 1] : [dx / d, dy / d];
}

function clampCornerDir(cnx, cny, corner) {
  if (corner === 'tr') {
    if (cnx < 0 && cny > 0) {
      var a = Math.atan2(cny, cnx);
      return a > 3 * Math.PI / 4 ? [-1, 0] : [0, 1];
    }
  } else {
    if (cnx > 0 && cny < 0) {
      var a = Math.atan2(cny, cnx);
      return a > -Math.PI / 4 ? [1, 0] : [0, -1];
    }
  }
  return [cnx, cny];
}

function compute() {
  var h = house();
  var r = ropeLen * ppm;
  var a = safeAngle(dogAngle);

  if (a > -Math.PI && a < -Math.PI / 2) {
    var mid = -3 * Math.PI / 4;
    if (a > mid && ropeLen > BH) {
      var remR = (ropeLen - BH) * ppm;
      var cdir = norm(mousePx - h.tr[0], mousePy - h.tr[1]);
      var clamped = clampCornerDir(cdir[0], cdir[1], 'tr');
      var cx = h.tr[0] + remR * clamped[0], cy = h.tr[1] + remR * clamped[1];
      return { x: cx, y: cy, path: [[h.tx, h.ty], [h.tr[0], h.tr[1]], [cx, cy]], wrap: 'tr' };
    }
    if (a <= mid && ropeLen > BW) {
      var remR = (ropeLen - BW) * ppm;
      var cdir = norm(mousePx - h.bl[0], mousePy - h.bl[1]);
      var clamped = clampCornerDir(cdir[0], cdir[1], 'bl');
      var cx = h.bl[0] + remR * clamped[0], cy = h.bl[1] + remR * clamped[1];
      return { x: cx, y: cy, path: [[h.tx, h.ty], [h.bl[0], h.bl[1]], [cx, cy]], wrap: 'bl' };
    }
    a = a > mid ? -Math.PI / 2 : -Math.PI;
  }

  return {
    x: h.tx + r * Math.cos(a),
    y: h.ty + r * Math.sin(a),
    path: [[h.tx, h.ty], [h.tx + r * Math.cos(a), h.ty + r * Math.sin(a)]],
    wrap: null
  };
}

function onMove(px, py) {
  mousePx = px; mousePy = py;
  if (!dragging) return;
  var h = house();
  var rawAngle = Math.atan2(py - h.ty, px - h.tx);
  var dx = px - h.tx, dy = py - h.ty;
  var blocked = dx < 0 && dy < 0;

  if (blocked) {
    var mid = -3 * Math.PI / 4;
    if (rawAngle > mid) {
      if (ropeLen > BH) {
        var remR = (ropeLen - BH) * ppm;
        var ca = Math.atan2(py - h.tr[1], px - h.tr[0]);
        if (ca > Math.PI / 2 && ca < Math.PI) ca = ca > 3 * Math.PI / 4 ? Math.PI : Math.PI / 2;
        dogAngle = Math.atan2(h.tr[1] + remR * Math.sin(ca) - h.ty, h.tr[0] + remR * Math.cos(ca) - h.tx);
      } else {
        dogAngle = -Math.PI / 2;
      }
    } else {
      if (ropeLen > BW) {
        var remR = (ropeLen - BW) * ppm;
        var ca = Math.atan2(py - h.bl[1], px - h.bl[0]);
        if (ca > -Math.PI / 2 && ca < 0) ca = ca > -Math.PI / 4 ? 0 : -Math.PI / 2;
        dogAngle = Math.atan2(h.bl[1] + remR * Math.sin(ca) - h.ty, h.bl[0] + remR * Math.cos(ca) - h.tx);
      } else {
        dogAngle = -Math.PI;
      }
    }
  } else {
    dogAngle = rawAngle;
  }

  dogAngle = safeAngle(dogAngle);
  draw();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  var h = house();
  var info = compute();

  var step = ppm;
  ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 1;
  for (var x = ppm; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (var y = ppm; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  var r = ropeLen * ppm;
  ctx.save(); ctx.beginPath(); ctx.moveTo(h.tx, h.ty);
  ctx.arc(h.tx, h.ty, r, -Math.PI / 2, Math.PI); ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,0.18)'; ctx.fill();
  ctx.strokeStyle = 'rgba(59,130,246,0.4)'; ctx.lineWidth = 1.5; ctx.stroke(); ctx.restore();

  if (ropeLen > BH) {
    ctx.save(); ctx.beginPath(); ctx.moveTo(h.tr[0], h.tr[1]);
    ctx.arc(h.tr[0], h.tr[1], (ropeLen - BH) * ppm, -Math.PI, -Math.PI / 2); ctx.closePath();
    ctx.fillStyle = 'rgba(217,119,6,0.2)'; ctx.fill(); ctx.restore();
  }
  if (ropeLen > BW) {
    ctx.save(); ctx.beginPath(); ctx.moveTo(h.bl[0], h.bl[1]);
    ctx.arc(h.bl[0], h.bl[1], (ropeLen - BW) * ppm, Math.PI, Math.PI * 1.5, false); ctx.closePath();
    ctx.fillStyle = 'rgba(217,119,6,0.2)'; ctx.fill(); ctx.restore();
  }

  ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fillRect(h.x + 5, h.y + 5, h.w, h.h);
  ctx.fillStyle = '#fff'; ctx.fillRect(h.x, h.y, h.w, h.h);
  ctx.strokeStyle = '#374151'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  ctx.strokeRect(h.x, h.y, h.w, h.h);

  ctx.fillStyle = '#6b7280'; ctx.font = 'bold 16px "Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('小屋', h.x + h.w / 2, h.y + h.h / 2);

  ctx.font = '13px monospace'; ctx.fillStyle = '#9ca3af';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('12m', h.x + h.w / 2, h.y + h.h + 8);
  ctx.save(); ctx.translate(h.x - 8, h.y + h.h / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('6m', 0, 0); ctx.restore();

  ctx.beginPath(); ctx.arc(h.tx, h.ty, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#ef4444'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  ctx.beginPath(); ctx.moveTo(info.path[0][0], info.path[0][1]);
  for (var i = 1; i < info.path.length; i++) ctx.lineTo(info.path[i][0], info.path[i][1]);
  ctx.strokeStyle = '#92400e'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();

  var dr = 14;
  ctx.save(); ctx.translate(info.x, info.y);
  ctx.fillStyle = '#d97706'; ctx.beginPath(); ctx.arc(0, 0, dr, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#92400e'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fef3c7';
  ctx.beginPath(); ctx.ellipse(-dr * 0.65, -dr * 0.35, dr * 0.3, dr * 0.55, -0.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(dr * 0.65, -dr * 0.35, dr * 0.3, dr * 0.55, 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1f2937';
  ctx.beginPath(); ctx.arc(-dr * 0.22, -dr * 0.12, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(dr * 0.22, -dr * 0.12, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, dr * 0.15, 3, 0, Math.PI);
  ctx.strokeStyle = '#92400e'; ctx.lineWidth = 1.5; ctx.stroke();

  var labelR = ropeLen;
  if (info.wrap === 'tr') labelR = ropeLen - BH;
  if (info.wrap === 'bl') labelR = ropeLen - BW;
  ctx.fillStyle = '#374151'; ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText(labelR + 'm', 0, -dr - 8);
  ctx.restore();
}

function onDown(px, py) {
  var info = compute();
  if (Math.hypot(px - info.x, py - info.y) < 30) { dragging = true; c.classList.add('drag-hover'); }
}
function onUp() { dragging = false; c.classList.remove('drag-hover'); }

c.addEventListener('mousedown', function(e) { onDown(e.clientX, e.clientY); });
c.addEventListener('mousemove', function(e) {
  mousePx = e.clientX; mousePy = e.clientY;
  if (dragging) { onMove(e.clientX, e.clientY); }
  else { var info = compute(); c.classList.toggle('drag-hover', Math.hypot(e.clientX - info.x, e.clientY - info.y) < 30); }
});
c.addEventListener('mouseup', onUp);
c.addEventListener('mouseleave', onUp);
c.addEventListener('touchstart', function(e) { e.preventDefault(); var t = e.touches[0]; mousePx = t.clientX; mousePy = t.clientY; onDown(t.clientX, t.clientY); }, { passive: false });
c.addEventListener('touchmove', function(e) { e.preventDefault(); var t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
c.addEventListener('touchend', onUp);

document.getElementById('ropeSlider').addEventListener('input', function() {
  ropeLen = parseInt(this.value);
  document.getElementById('ropeVal').textContent = ropeLen + 'm';
  dogAngle = Math.PI / 4;
  var h = house();
  mousePx = h.tx + ropeLen * ppm * Math.cos(dogAngle);
  mousePy = h.ty + ropeLen * ppm * Math.sin(dogAngle);
  draw();
});
document.getElementById('btnIn').addEventListener('click', function() { ppm = Math.min(ppm * 1.2, 40); draw(); });
document.getElementById('btnOut').addEventListener('click', function() { ppm = Math.max(ppm / 1.2, 6); draw(); });
c.addEventListener('wheel', function(e) { e.preventDefault(); ppm = e.deltaY > 0 ? Math.max(ppm / 1.08, 6) : Math.min(ppm * 1.08, 40); draw(); }, { passive: false });

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
