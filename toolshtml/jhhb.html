<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>几何画板</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg:#f5f7fa;--card:#fff;--fg:#2d3748;--fg-muted:#718096;
    --accent:#f97316;--accent-glow:rgba(249,115,22,0.15);--accent-soft:rgba(249,115,22,0.08);
    --border:rgba(249,115,22,0.12);--border-strong:rgba(249,115,22,0.25);
    --success:#48bb78;--danger:#f56565;
    --radius:14px;--radius-sm:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;}
  .page-header{padding:24px 20px 16px;text-align:center;background:var(--card);border-bottom:1px solid var(--border);}
  .page-header h1{font-size:28px;font-weight:900;}
  .page-header h1 span{color:var(--accent);}
  .page-header p{font-size:13px;color:var(--fg-muted);margin-top:4px;}

  .workspace{display:flex;flex:1;overflow:hidden;}
  .sidebar{
    width:200px;background:var(--card);border-right:1px solid var(--border);
    display:flex;flex-direction:column;padding:12px 0;overflow-y:auto;flex-shrink:0;
  }
  .tool-group{padding:4px 12px;margin-top:8px;font-size:11px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:1px;}
  .tool-btn{
    display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;
    border:none;background:transparent;color:var(--fg);font-size:13px;font-family:inherit;
    cursor:pointer;transition:all 0.15s;text-align:left;
  }
  .tool-btn:hover{background:var(--accent-soft);}
  .tool-btn.active{background:var(--accent);color:#fff;font-weight:600;}
  .tool-btn i{width:20px;text-align:center;font-size:14px;}

  .canvas-area{flex:1;position:relative;overflow:hidden;background:#fff;}
  #geoCanvas{display:block;width:100%;height:100%;}
  .canvas-grid{position:absolute;inset:0;pointer-events:none;
    background-image:linear-gradient(rgba(249,115,22,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(249,115,22,0.04) 1px,transparent 1px);
    background-size:30px 30px;
  }

  .status-bar{
    display:flex;gap:16px;padding:8px 16px;background:var(--card);border-top:1px solid var(--border);
    font-size:12px;color:var(--fg-muted);align-items:center;
  }
  .status-bar .sep{width:1px;height:14px;background:var(--border);}

  .props-panel{
    width:220px;background:var(--card);border-left:1px solid var(--border);
    padding:16px;overflow-y:auto;flex-shrink:0;
  }
  .props-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
  .props-title i{color:var(--accent);}
  .prop-row{margin-bottom:12px;}
  .prop-label{font-size:12px;color:var(--fg-muted);margin-bottom:4px;}
  .prop-input{width:100%;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);}
  .prop-input:focus{border-color:var(--accent);}
  .prop-color{width:100%;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;}
  .prop-btn{
    width:100%;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);
    background:var(--card);color:var(--fg-muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.15s;
  }
  .prop-btn:hover{border-color:var(--accent);color:var(--accent);}
  .prop-btn.danger{border-color:rgba(245,101,101,0.3);color:var(--danger);}
  .prop-btn.danger:hover{background:rgba(245,101,101,0.05);}

  @media(max-width:768px){.sidebar,.props-panel{display:none;}.workspace{flex-direction:column;}}
</style>
</head>
<body>

<header class="page-header">
  <h1><i class="fa-solid fa-draw-polygon" style="color:var(--accent)"></i> 几何画板</h1>
  <p>交互式几何图形绘制，支持拖拽与测量</p>
</header>

<div class="workspace">
  <div class="sidebar">
    <div class="tool-group">选择</div>
    <button class="tool-btn active" data-tool="select"><i class="fa-solid fa-arrow-pointer"></i> 选择</button>

    <div class="tool-group">基本图形</div>
    <button class="tool-btn" data-tool="point"><i class="fa-solid fa-circle" style="font-size:10px"></i> 点</button>
    <button class="tool-btn" data-tool="line"><i class="fa-solid fa-minus"></i> 线段</button>
    <button class="tool-btn" data-tool="ray"><i class="fa-solid fa-arrow-right-long"></i> 射线</button>
    <button class="tool-btn" data-tool="segment"><i class="fa-solid fa-arrows-left-right"></i> 线段(定长)</button>

    <div class="tool-group">多边形</div>
    <button class="tool-btn" data-tool="triangle"><i class="fa-solid fa-play fa-rotate-270"></i> 三角形</button>
    <button class="tool-btn" data-tool="rect"><i class="fa-regular fa-square"></i> 矩形</button>
    <button class="tool-btn" data-tool="polygon"><i class="fa-solid fa-draw-polygon"></i> 正多边形</button>

    <div class="tool-group">圆</div>
    <button class="tool-btn" data-tool="circle"><i class="fa-regular fa-circle"></i> 圆</button>

    <div class="tool-group">标注</div>
    <button class="tool-btn" data-tool="angle"><i class="fa-solid fa-angle-left"></i> 角度标注</button>
    <button class="tool-btn" data-tool="dist"><i class="fa-solid fa-ruler"></i> 距离标注</button>
  </div>

  <div class="canvas-area">
    <div class="canvas-grid"></div>
    <canvas id="geoCanvas"></canvas>
  </div>

  <div class="props-panel" id="propsPanel">
    <div class="props-title"><i class="fa-solid fa-sliders"></i> 属性</div>
    <div id="propsContent">
      <div style="font-size:13px;color:var(--fg-muted);padding:16px 0;text-align:center;">选择图形查看属性</div>
    </div>
    <div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--border);">
      <button class="prop-btn" id="btnUndo"><i class="fa-solid fa-rotate-left"></i> 撤销</button>
      <button class="prop-btn danger" id="btnClear" style="margin-top:6px;"><i class="fa-solid fa-trash"></i> 清空</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="statusCoord">坐标: —</span>
  <div class="sep"></div>
  <span id="statusTool">工具: 选择</span>
  <div class="sep"></div>
  <span id="statusShape">图形: 0</span>
</div>

<script>
const canvas = document.getElementById('geoCanvas');
const ctx = canvas.getContext('2d');
let W, H, shapes = [], selectedIdx = -1, currentTool = 'select';
let tempPoints = [], dragging = -1, dragOffX = 0, dragOffY = 0;
let snapDist = 8, polySides = 6;
const COLORS = ['#f97316','#0ea5e9','#10b981','#8b5cf6','#ef4444','#eab308','#ec4899'];
let colorIdx = 0;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  W = canvas.width = rect.width * devicePixelRatio;
  H = canvas.height = rect.height * devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  draw();
}
window.addEventListener('resize', resize);

function snap(v) { return Math.round(v / 30) * 30; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function draw() {
  const w = W / devicePixelRatio, h = H / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  shapes.forEach((s, i) => drawShape(s, i === selectedIdx));
  if (tempPoints.length > 0) {
    ctx.fillStyle = '#f97316';
    tempPoints.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill(); });
  }
  document.getElementById('statusShape').textContent = '图形: ' + shapes.length;
}

function drawShape(s, sel) {
  const lw = sel ? 2.5 : 2;
  ctx.lineWidth = lw;
  ctx.strokeStyle = s.color || '#f97316';
  ctx.fillStyle = s.fill || 'transparent';
  ctx.lineCap = 'round';

  switch(s.type) {
    case 'point':
      ctx.beginPath(); ctx.arc(s.x, s.y, sel ? 6 : 4, 0, Math.PI*2);
      ctx.fillStyle = s.color || '#f97316'; ctx.fill();
      break;
    case 'line': case 'ray': case 'segment':
      ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
      if (s.type === 'segment') {
        const d = dist({x:s.x1,y:s.y1},{x:s.x2,y:s.y2});
        const mx = (s.x1+s.x2)/2, my = (s.y1+s.y2)/2;
        ctx.fillStyle = '#718096'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(d.toFixed(0), mx, my - 10);
      }
      break;
    case 'triangle': case 'rect': case 'polygon': case 'circle':
      ctx.beginPath();
      if (s.type === 'circle') {
        ctx.arc(s.cx, s.cy, s.r, 0, Math.PI*2);
      } else {
        ctx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
        ctx.closePath();
      }
      if (s.fill && s.fill !== 'transparent') { ctx.globalAlpha = 0.1; ctx.fill(); ctx.globalAlpha = 1; }
      ctx.stroke();
      break;
  }

  if (sel) {
    ctx.setLineDash([4,4]); ctx.strokeStyle = s.color || '#f97316';
    const pts = getAllPoints(s);
    pts.forEach(p => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  if (s.type === 'angle' && s.points && s.points.length === 3) {
    const [a,b,c] = s.points;
    const ang = Math.atan2(c.y-b.y,c.x-b.x) - Math.atan2(a.y-b.y,a.x-b.x);
    const deg = ((ang * 180 / Math.PI) + 360) % 360;
    ctx.fillStyle = '#718096'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(deg.toFixed(1) + '°', b.x + 25, b.y - 15);
  }

  if (s.type === 'dist' && s.points && s.points.length === 2) {
    const [a,b] = s.points;
    const d = dist(a,b);
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    ctx.fillStyle = '#f97316'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d.toFixed(1), mx, my - 12);
  }
}

function getAllPoints(s) {
  if (s.type === 'point') return [{x:s.x, y:s.y}];
  if (s.type === 'line' || s.type === 'ray' || s.type === 'segment') return [{x:s.x1,y:s.y1},{x:s.x2,y:s.y2}];
  if (s.points) return s.points;
  if (s.type === 'circle') return [{x:s.cx, y:s.cy}];
  return [];
}

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function findNearest(pt) {
  let best = -1, bestD = snapDist;
  shapes.forEach((s, i) => {
    getAllPoints(s).forEach(p => {
      const d = dist(pt, p);
      if (d < bestD) { bestD = d; best = i; }
    });
  });
  return best;
}

canvas.addEventListener('mousedown', e => {
  const pt = getMousePos(e);
  const sp = { x: snap(pt.x), y: snap(pt.y) };

  if (currentTool === 'select') {
    const idx = findNearest(pt);
    if (idx >= 0) {
      selectedIdx = idx;
      dragging = idx;
      const pts = getAllPoints(shapes[idx]);
      if (pts.length > 0) { dragOffX = pt.x - pts[0].x; dragOffY = pt.y - pts[0].y; }
    } else {
      selectedIdx = -1;
    }
    draw();
    return;
  }

  if (currentTool === 'point') {
    shapes.push({ type:'point', x:sp.x, y:sp.y, color:COLORS[colorIdx++%COLORS.length] });
    draw(); return;
  }

  if (currentTool === 'line' || currentTool === 'ray' || currentTool === 'segment') {
    tempPoints.push(sp);
    if (tempPoints.length === 2) {
      shapes.push({ type:currentTool, x1:tempPoints[0].x, y1:tempPoints[0].y, x2:tempPoints[1].x, y2:tempPoints[1].y, color:COLORS[colorIdx++%COLORS.length] });
      tempPoints = [];
    }
    draw(); return;
  }

  if (currentTool === 'triangle' || currentTool === 'rect') {
    tempPoints.push(sp);
    if (currentTool === 'triangle' && tempPoints.length === 3) {
      shapes.push({ type:'triangle', points:[...tempPoints], color:COLORS[colorIdx++%COLORS.length], fill:COLORS[(colorIdx-1)%COLORS.length] });
      tempPoints = [];
    }
    if (currentTool === 'rect' && tempPoints.length === 2) {
      const [a,b] = tempPoints;
      shapes.push({ type:'rect', points:[a, {x:b.x,y:a.y}, b, {x:a.x,y:b.y}], color:COLORS[colorIdx++%COLORS.length], fill:COLORS[(colorIdx-1)%COLORS.length] });
      tempPoints = [];
    }
    draw(); return;
  }

  if (currentTool === 'polygon') {
    tempPoints.push(sp);
    if (tempPoints.length === polySides) {
      shapes.push({ type:'polygon', points:[...tempPoints], color:COLORS[colorIdx++%COLORS.length], fill:COLORS[(colorIdx-1)%COLORS.length] });
      tempPoints = [];
    }
    draw(); return;
  }

  if (currentTool === 'circle') {
    tempPoints.push(sp);
    if (tempPoints.length === 2) {
      const r = dist(tempPoints[0], tempPoints[1]);
      shapes.push({ type:'circle', cx:tempPoints[0].x, cy:tempPoints[0].y, r, color:COLORS[colorIdx++%COLORS.length], fill:COLORS[(colorIdx-1)%COLORS.length] });
      tempPoints = [];
    }
    draw(); return;
  }

  if (currentTool === 'angle' || currentTool === 'dist') {
    tempPoints.push(sp);
    if (tempPoints.length === (currentTool === 'angle' ? 3 : 2)) {
      shapes.push({ type:currentTool, points:[...tempPoints], color:COLORS[colorIdx++%COLORS.length] });
      tempPoints = [];
    }
    draw(); return;
  }
});

canvas.addEventListener('mousemove', e => {
  const pt = getMousePos(e);
  document.getElementById('statusCoord').textContent = `坐标: (${Math.round(pt.x)}, ${Math.round(pt.y)})`;
  if (dragging >= 0) {
    const s = shapes[dragging];
    const dx = pt.x - dragOffX - getAllPoints(s)[0].x;
    const dy = pt.y - dragOffY - getAllPoints(s)[0].y;
    moveShape(s, dx, dy);
    draw();
  }
});

canvas.addEventListener('mouseup', () => { dragging = -1; });

function moveShape(s, dx, dy) {
  if (s.type === 'point') { s.x += dx; s.y += dy; }
  else if (s.type === 'line' || s.type === 'ray' || s.type === 'segment') { s.x1+=dx;s.y1+=dy;s.x2+=dx;s.y2+=dy; }
  else if (s.type === 'circle') { s.cx+=dx; s.cy+=dy; }
  else if (s.points) { s.points.forEach(p => { p.x+=dx; p.y+=dy; }); }
}

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    tempPoints = [];
    document.getElementById('statusTool').textContent = '工具: ' + btn.textContent.trim();
    draw();
  });
});

document.getElementById('btnUndo').addEventListener('click', () => {
  if (shapes.length > 0) { shapes.pop(); selectedIdx = -1; draw(); }
});
document.getElementById('btnClear').addEventListener('click', () => {
  shapes = []; selectedIdx = -1; tempPoints = []; draw();
});

resize();
</script>
</body>
</html>
